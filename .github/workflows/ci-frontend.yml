name: CI Frontend

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
      - 'docs/**'

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Vite)
        run: npm run build

